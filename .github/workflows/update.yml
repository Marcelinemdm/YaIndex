name: YaIndex Auto-Update

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run updater
        run: python update.py

      - name: Commit & Push se houve mudanças
        run: |
          git config user.name  "YaIndex Bot"
          git config user.email "bot@yaindex.dev"
          git add data.json
          git diff --cached --quiet || git commit -m "chore: auto-update data.json $(date -u '+%Y-%m-%d')"
          git push