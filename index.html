<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>YaIndex</title>
  <meta name="description" content="Índice otaku curado e auto-atualizado de +200 recursos."/>
  <link rel="icon" type="image/jpeg" href="/diva.jpg"/>
  <link rel="apple-touch-icon" href="/diva.jpg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet"/>
  <style>


  /* NOVO (padrão) */
  [data-theme="novo"], :root {
    --bg:#080810; --bg2:#0e0e1a; --bg3:#141422; --bg4:#1a1a2e;
    --border:#1e1e35; --border2:#2a2a4a;
    --text:#e8e8f8; --text2:#b0b0d8; --muted:#6668a8; --muted2:#9090c0;
    --a1:#ff6eb4; --a2:#ff9fd4; --a3:#ffd6ec;
    --a4:#a855f7; --a5:#c084fc;
    --a6:#22d3ee; --a7:#67e8f9;
    --green:#10b981; --red:#f43f5e; --yellow:#fbbf24;
    --grad-title:linear-gradient(135deg,#ff6eb4,#a855f7,#22d3ee);
    --grad-btn:linear-gradient(135deg,#a855f7,#ff6eb4);
    --card-bg:rgba(14,14,26,.85);
    --card-hover-border:rgba(255,110,180,.4);
    --card-hover-shadow:0 8px 32px rgba(255,110,180,.12);
    --header-glow:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(168,85,247,.14) 0%,transparent 70%);
    --header-line:linear-gradient(90deg,transparent,#ff6eb4,#a855f7,#22d3ee,transparent);
    --search-focus-shadow:0 0 0 3px rgba(255,110,180,.15);
    --filter-active-bg:linear-gradient(135deg,rgba(255,110,180,.2),rgba(168,85,247,.2));
    --filter-active-border:#ff6eb4;
    --filter-active-color:#ff9fd4;
    --tag-bg:rgba(168,85,247,.12); --tag-border:rgba(168,85,247,.22); --tag-color:#c084fc;
    --item-hover-bg:rgba(255,110,180,.06);
    --show-more-hover:rgba(255,110,180,.05);
    --grid-line:rgba(255,110,180,.025);
    --petal-color:radial-gradient(circle,#ff9fd4 30%,transparent 70%);
    --petals-visible:1;
    --badge-hover-border:var(--a1); --badge-hover-color:var(--a2);
    --commit-bg:var(--bg3);
    --rank1:#fbbf24; --rank2:#c0c0c0; --rank3:#cd7f32;
  }

  /* LEGADO */
  [data-theme="legado"] {
    --bg:#0f0f13; --bg2:#16161d; --bg3:#1e1e2a; --bg4:#252535;
    --border:#2a2a3a; --border2:#2a2a3a;
    --text:#e2e2f0; --text2:#b0b0c8; --muted:#8888aa; --muted2:#8888aa;
    --a1:#6366f1; --a2:#a78bfa; --a3:#c4b5fd;
    --a4:#6366f1; --a5:#a78bfa;
    --a6:#6366f1; --a7:#a78bfa;
    --green:#10b981; --red:#ef4444; --yellow:#f59e0b;
    --grad-title:linear-gradient(135deg,#a78bfa,#6366f1,#38bdf8);
    --grad-btn:linear-gradient(135deg,#6366f1,#a78bfa);
    --card-bg:#16161d;
    --card-hover-border:rgba(99,102,241,.4);
    --card-hover-shadow:0 4px 24px rgba(0,0,0,.4);
    --header-glow:none;
    --header-line:linear-gradient(90deg,transparent,#6366f1,#a78bfa,transparent);
    --search-focus-shadow:0 0 0 3px rgba(99,102,241,.2);
    --filter-active-bg:#6366f1;
    --filter-active-border:#6366f1;
    --filter-active-color:#fff;
    --tag-bg:rgba(99,102,241,.12); --tag-border:rgba(99,102,241,.25); --tag-color:#a78bfa;
    --item-hover-bg:var(--bg3);
    --show-more-hover:var(--bg3);
    --grid-line:transparent;
    --petal-color:none;
    --petals-visible:0;
    --badge-hover-border:var(--a1); --badge-hover-color:var(--a2);
    --commit-bg:var(--bg3);
    --rank1:#f59e0b; --rank2:#c0c0c0; --rank3:#cd7f32;
  }

  /* BLACK */
  [data-theme="black"] {
    --bg:#000; --bg2:#0a0a0a; --bg3:#111; --bg4:#181818;
    --border:#1a1a1a; --border2:#222;
    --text:#fff; --text2:#aaa; --muted:#444; --muted2:#666;
    --a1:#fff; --a2:#ccc; --a3:#999;
    --a4:#fff; --a5:#ccc;
    --a6:#fff; --a7:#ccc;
    --green:#22c55e; --red:#ef4444; --yellow:#eab308;
    --grad-title:linear-gradient(135deg,#fff,#aaa);
    --grad-btn:linear-gradient(135deg,#333,#111);
    --card-bg:#0a0a0a;
    --card-hover-border:rgba(255,255,255,.2);
    --card-hover-shadow:0 4px 20px rgba(255,255,255,.05);
    --header-glow:none;
    --header-line:linear-gradient(90deg,transparent,#fff,transparent);
    --search-focus-shadow:0 0 0 3px rgba(255,255,255,.1);
    --filter-active-bg:#fff;
    --filter-active-border:#fff;
    --filter-active-color:#000;
    --tag-bg:rgba(255,255,255,.06); --tag-border:rgba(255,255,255,.12); --tag-color:#aaa;
    --item-hover-bg:rgba(255,255,255,.04);
    --show-more-hover:rgba(255,255,255,.04);
    --grid-line:rgba(255,255,255,.02);
    --petal-color:none;
    --petals-visible:0;
    --badge-hover-border:#fff; --badge-hover-color:#fff;
    --commit-bg:#111;
    --rank1:#eab308; --rank2:#aaa; --rank3:#888;
  }

  /* WHITE */
  [data-theme="white"] {
    --bg:#f5f5f7; --bg2:#fff; --bg3:#f0f0f5; --bg4:#e8e8f0;
    --border:#e0e0ea; --border2:#d0d0e0;
    --text:#111; --text2:#444; --muted:#999; --muted2:#777;
    --a1:#6366f1; --a2:#4f52d9; --a3:#a78bfa;
    --a4:#7c3aed; --a5:#6d28d9;
    --a6:#0891b2; --a7:#0e7490;
    --green:#16a34a; --red:#dc2626; --yellow:#d97706;
    --grad-title:linear-gradient(135deg,#6366f1,#7c3aed,#0891b2);
    --grad-btn:linear-gradient(135deg,#7c3aed,#6366f1);
    --card-bg:#fff;
    --card-hover-border:rgba(99,102,241,.3);
    --card-hover-shadow:0 4px 20px rgba(99,102,241,.1);
    --header-glow:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(99,102,241,.08) 0%,transparent 70%);
    --header-line:linear-gradient(90deg,transparent,#6366f1,#7c3aed,transparent);
    --search-focus-shadow:0 0 0 3px rgba(99,102,241,.15);
    --filter-active-bg:linear-gradient(135deg,rgba(99,102,241,.15),rgba(124,58,237,.15));
    --filter-active-border:#6366f1;
    --filter-active-color:#4f52d9;
    --tag-bg:rgba(99,102,241,.08); --tag-border:rgba(99,102,241,.2); --tag-color:#6366f1;
    --item-hover-bg:rgba(99,102,241,.04);
    --show-more-hover:rgba(99,102,241,.04);
    --grid-line:rgba(99,102,241,.03);
    --petal-color:none;
    --petals-visible:0;
    --badge-hover-border:var(--a1); --badge-hover-color:var(--a2);
    --commit-bg:var(--bg3);
    --rank1:#d97706; --rank2:#777; --rank3:#a16207;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--text);
    font-family:'Nunito',system-ui,sans-serif;
    min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}
  a{color:inherit;text-decoration:none}

  body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:
      linear-gradient(var(--grid-line) 1px,transparent 1px),
      linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);
    background-size:40px 40px}

  .petals{position:fixed;top:0;left:0;width:100%;height:100%;
    pointer-events:none;z-index:0;overflow:hidden;
    opacity:var(--petals-visible);transition:opacity .5s}
  .petal{position:absolute;top:-20px;width:8px;height:8px;
    background:radial-gradient(circle,#ff9fd4 30%,transparent 70%);
    border-radius:50% 0 50% 0;opacity:0;animation:fall linear infinite}
  .petal:nth-child(1){left:5%;animation-duration:12s;animation-delay:0s;width:6px;height:6px}
  .petal:nth-child(2){left:15%;animation-duration:16s;animation-delay:2s}
  .petal:nth-child(3){left:25%;animation-duration:11s;animation-delay:4s;width:10px;height:10px}
  .petal:nth-child(4){left:35%;animation-duration:14s;animation-delay:1s}
  .petal:nth-child(5){left:50%;animation-duration:13s;animation-delay:3s;width:5px;height:5px}
  .petal:nth-child(6){left:60%;animation-duration:15s;animation-delay:5s}
  .petal:nth-child(7){left:70%;animation-duration:10s;animation-delay:2s;width:9px;height:9px}
  .petal:nth-child(8){left:80%;animation-duration:17s;animation-delay:6s}
  .petal:nth-child(9){left:90%;animation-duration:12s;animation-delay:1s;width:6px;height:6px}
  .petal:nth-child(10){left:45%;animation-duration:14s;animation-delay:8s}
  @keyframes fall{
    0%{transform:translateY(-20px) rotate(0deg) translateX(0);opacity:0}
    10%{opacity:.6}
    90%{opacity:.3}
    100%{transform:translateY(110vh) rotate(720deg) translateX(60px);opacity:0}
  }

  .theme-switcher{position:fixed;top:.9rem;right:1rem;z-index:200;
    display:flex;gap:.35rem;background:rgba(0,0,0,.4);
    backdrop-filter:blur(12px);border:1px solid var(--border2);
    border-radius:99px;padding:.3rem .5rem}
  .th-btn{background:none;border:none;cursor:pointer;
    font-size:.72rem;font-weight:800;padding:.22rem .55rem;
    border-radius:99px;color:var(--muted2);transition:.2s;
    font-family:'Nunito',sans-serif;letter-spacing:.02em}
  .th-btn:hover{color:var(--text)}
  .th-btn.active{background:var(--a1);color:#fff}
  [data-theme="white"] .theme-switcher{background:rgba(255,255,255,.7);border-color:var(--border2)}
  [data-theme="white"] .th-btn.active{color:#fff}

  header{position:relative;z-index:10;padding:3rem 1.5rem 2rem;text-align:center;
    background:var(--header-glow)}
  .header-border{position:absolute;bottom:0;left:0;right:0;height:1px;
    background:var(--header-line)}
  .header-icon{width:72px;height:72px;border-radius:50%;margin:0 auto 1rem;
    border:2px solid var(--a1);overflow:hidden;
    box-shadow:0 0 20px rgba(0,0,0,.3)}
  .header-icon img{width:100%;height:100%;object-fit:cover;display:block}
  header h1{font-size:2.8rem;font-weight:900;letter-spacing:-1.5px;line-height:1.1}
  .title-text{background:var(--grad-title);-webkit-background-clip:text;
    -webkit-text-fill-color:transparent;background-clip:text}
  .title-jp{display:block;font-family:'Noto Sans JP',sans-serif;font-size:.78rem;
    color:var(--muted2);letter-spacing:.2em;margin-top:.25rem}
  header p{color:var(--muted2);margin-top:.5rem;font-size:.92rem}

  .header-meta{display:flex;justify-content:center;gap:.6rem;
    margin-top:1.1rem;flex-wrap:wrap;position:relative;z-index:1}
  .badge{background:rgba(128,128,128,.08);border:1px solid var(--border2);
    border-radius:99px;padding:.32rem .9rem;font-size:.79rem;color:var(--muted2);
    display:flex;align-items:center;gap:.35rem;cursor:default;
    transition:.2s;white-space:nowrap}
  .badge:hover{border-color:var(--badge-hover-border);color:var(--badge-hover-color)}
  .badge .val{color:var(--a2);font-weight:800}
  .badge-link{cursor:pointer}
  [data-theme="white"] .badge{background:rgba(0,0,0,.04)}
  [data-theme="black"] .badge{background:rgba(255,255,255,.04)}

  .badge-wrap{position:relative;display:inline-flex}
  .commit-popup{display:none;position:fixed;
    background:var(--commit-bg);border:1px solid var(--border2);
    border-radius:10px;padding:.9rem 1.1rem;
    font-size:.78rem;color:var(--muted2);z-index:500;
    white-space:nowrap;box-shadow:0 12px 40px rgba(0,0,0,.5);
    min-width:240px;pointer-events:all}
  .commit-popup.show{display:block}
  .commit-popup strong{color:var(--a7)}
  .commit-popup a{color:var(--a5)}
  .commit-popup a:hover{text-decoration:underline}
  [data-theme="white"] .commit-popup{box-shadow:0 8px 32px rgba(0,0,0,.15)}

  .search-wrap{max-width:640px;margin:1.5rem auto 0;padding:0 1rem;
    position:relative;z-index:10}
  .search-inner{position:relative;isolation:isolate}
  .search-glow{position:absolute;inset:-1px;border-radius:99px;
    background:var(--grad-title);opacity:0;transition:.3s;z-index:-1;
    will-change:opacity}
  .search-inner:focus-within .search-glow{opacity:.4}
  #search{width:100%;background:rgba(128,128,128,.07);
    border:1px solid var(--border2);border-radius:99px;
    padding:.85rem 1.4rem .85rem 3rem;color:var(--text);
    font-size:1rem;outline:none;transition:.2s;font-family:'Nunito',sans-serif}
  #search::placeholder{color:var(--muted)}
  #search:focus{border-color:transparent;background:rgba(128,128,128,.1);
    box-shadow:var(--search-focus-shadow)}
  .search-icon{position:absolute;left:1.1rem;top:50%;transform:translateY(-50%);
    width:18px;height:18px;pointer-events:none;opacity:.5;flex-shrink:0;z-index:2}
  [data-theme="white"] #search{background:rgba(0,0,0,.05)}
  [data-theme="black"] #search{background:rgba(255,255,255,.05)}
  #search-count{text-align:center;color:var(--muted);font-size:.82rem;
    margin-top:.55rem;min-height:1.2em}

  .filter-bar{display:flex;gap:.45rem;padding:.75rem 1rem 1rem;
    overflow-x:auto;scrollbar-width:none;
    max-width:1200px;margin:0 auto;position:relative;z-index:10}
  .filter-bar::-webkit-scrollbar{display:none}
  .filter-btn{background:rgba(128,128,128,.07);border:1px solid var(--border2);
    border-radius:99px;padding:.38rem .95rem;font-size:.81rem;color:var(--muted2);
    cursor:pointer;white-space:nowrap;transition:.2s;flex-shrink:0;
    font-family:'Nunito',sans-serif;font-weight:700}
  .filter-btn:hover{border-color:var(--a1);color:var(--a2)}
  .filter-btn.active{background:var(--filter-active-bg);
    border-color:var(--filter-active-border);
    color:var(--filter-active-color);
    box-shadow:0 0 10px rgba(128,0,255,.1)}
  [data-theme="white"] .filter-btn{background:rgba(0,0,0,.04);color:var(--muted)}
  [data-theme="black"] .filter-btn{background:rgba(255,255,255,.04);color:var(--muted2)}

  main{max-width:1200px;margin:0 auto;padding:0 1rem 4rem;
    position:relative;z-index:10}
  .categories-grid{display:grid;
    grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1.2rem}

  .category{background:var(--card-bg);border:1px solid var(--border2);
    border-radius:14px;overflow:hidden;transition:.25s;
    backdrop-filter:blur(4px)}
  .category:hover{border-color:var(--card-hover-border);
    transform:translateY(-3px);box-shadow:var(--card-hover-shadow)}
  [data-theme="white"] .category{box-shadow:0 1px 4px rgba(0,0,0,.06)}
  [data-theme="white"] .category:hover{box-shadow:var(--card-hover-shadow)}

  .category-header{padding:1rem 1.2rem .85rem;display:flex;align-items:center;
    gap:.7rem;border-bottom:1px solid var(--border);cursor:pointer;
    user-select:none;position:relative}
  .cat-accent{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:14px 0 0 0}
  .cat-icon{font-size:1.4rem}
  .cat-title{font-weight:800;font-size:.93rem;flex:1}
  .cat-count{background:rgba(128,128,128,.1);border:1px solid var(--border2);
    border-radius:99px;padding:.12rem .6rem;font-size:.71rem;color:var(--muted2)}
  .cat-toggle{color:var(--muted);font-size:.82rem;transition:.3s}
  .category.collapsed .cat-toggle{transform:rotate(-90deg)}
  .category.collapsed .items-list{display:none}

  .items-list{padding:.5rem 0}
  .item{display:flex;align-items:center;gap:.65rem;
    padding:.48rem 1.2rem;transition:.14s}
  .item:hover{background:var(--item-hover-bg)}
  .item:hover .item-name{color:var(--a2)}
  .item-rank{font-size:.67rem;color:var(--muted);width:1.35rem;
    text-align:right;flex-shrink:0;font-weight:700}
  .item-rank.r1{color:var(--rank1)}
  .item-rank.r2{color:var(--rank2)}
  .item-rank.r3{color:var(--rank3)}
  .item-status{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .status-online{background:var(--green);box-shadow:0 0 5px var(--green)}
  .status-warning{background:var(--yellow)}
  .status-offline{background:var(--red)}
  .item-name{font-size:.88rem;font-weight:700;flex:1;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    transition:.14s;color:var(--text)}
  .item-tags{display:flex;gap:.22rem;flex-wrap:nowrap;overflow:hidden}
  .tag{background:var(--tag-bg);border:1px solid var(--tag-border);
    border-radius:4px;padding:.07rem .38rem;font-size:.63rem;
    color:var(--tag-color);white-space:nowrap}
  .item.hidden{display:none}

  .show-more-btn{width:100%;background:none;border:none;
    border-top:1px solid var(--border);padding:.58rem;
    color:var(--muted);font-size:.79rem;cursor:pointer;
    transition:.2s;text-align:center;font-family:'Nunito',sans-serif}
  .show-more-btn:hover{color:var(--a2);background:var(--show-more-hover)}

  #no-results{display:none;text-align:center;padding:4rem;color:var(--muted)}
  #no-results p{font-size:3rem}
  #no-results small{font-size:.9rem;margin-top:.5rem;display:block}

  footer{border-top:1px solid var(--border);padding:1.4rem;text-align:center;
    color:var(--muted);font-size:.79rem;display:flex;justify-content:center;
    align-items:center;gap:1rem;flex-wrap:wrap;position:relative;z-index:10}
  footer a{color:var(--a5)}
  footer a:hover{color:var(--a1)}
  .admin-link{background:rgba(128,128,128,.07);border:1px solid var(--border2);
    border-radius:99px;padding:.32rem .85rem;font-size:.78rem;
    color:var(--muted2);transition:.2s}
  .admin-link:hover{border-color:var(--a1);color:var(--a2)}

  @media(max-width:600px){
    header h1{font-size:2rem}
    .categories-grid{grid-template-columns:1fr}
    .item-tags{display:none}
    .header-meta{gap:.35rem}
    .badge{font-size:.72rem;padding:.26rem .65rem}
    .theme-switcher{top:auto;bottom:1rem;right:1rem}
  }
  </style>
</head>
<body data-theme="novo">

<div class="petals" aria-hidden="true">
  <div class="petal"></div><div class="petal"></div><div class="petal"></div>
  <div class="petal"></div><div class="petal"></div><div class="petal"></div>
  <div class="petal"></div><div class="petal"></div><div class="petal"></div>
  <div class="petal"></div>
</div>

<div class="theme-switcher" role="group" aria-label="Tema">
  <button class="th-btn active" data-t="novo"   onclick="setTheme('novo')">Novo</button>
  <button class="th-btn"        data-t="legado" onclick="setTheme('legado')">Legado</button>
  <button class="th-btn"        data-t="black"  onclick="setTheme('black')">Black</button>
  <button class="th-btn"        data-t="white"  onclick="setTheme('white')">White</button>
</div>

<header>
  <div class="header-icon">
    <img src="diva.jpg" alt="YaIndex" loading="lazy"/>
  </div>
  <h1>
    <span class="title-text">YaIndex</span>
    <span class="title-jp">ヤインデックス — 索引</span>
  </h1>
  <p>Índice otaku curado &amp; auto-atualizado ✨</p>
  <div class="header-meta">
    <div class="badge"><span>📦</span><span class="val" id="total-items">—</span><span>recursos</span></div>
    <div class="badge"><span>🗂️</span><span class="val" id="total-cats">—</span><span>categorias</span></div>
    <div class="badge"><span>🔄</span><span>Atualizado</span><span class="val" id="last-updated">—</span></div>
    <div class="badge-wrap">
      <div class="badge" id="badge-commit" onclick="toggleCommitPopup()" style="cursor:pointer" title="Ver último commit">
        <span>⚡</span><span>Último commit</span><span class="val" id="commit-short">—</span>
      </div>
      <div class="commit-popup" id="commit-popup">
        <div id="commit-msg" style="margin-bottom:.45rem;font-weight:700">Carregando...</div>
        <div id="commit-meta" style="font-size:.72rem"></div>
        <div style="margin-top:.55rem">
          <a id="commit-link" href="#" target="_blank" rel="noopener">Ver no GitHub →</a>
        </div>
      </div>
    </div>
    <a class="badge" href="https://github.com/Marcelinemdm/YaIndex" target="_blank" rel="noopener"
       style="cursor:pointer">
      <span>⭐</span><span class="val">GitHub</span>
    </a>
  </div>
  <div class="header-border"></div>
</header>

<div class="search-wrap">
  <div class="search-inner">
    <div class="search-glow"></div>
    <svg class="search-icon" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="search" type="text" placeholder="Buscar site, tag, categoria..." autocomplete="off"/>
  </div>
  <div id="search-count"></div>
</div>

<div class="filter-bar" id="filter-bar"></div>

<main>
  <div id="no-results"><p>🌸</p><small>Nenhum resultado encontrado.</small></div>
  <div class="categories-grid" id="categories-grid"></div>
</main>

<footer>
  <span>🌸 <a href="https://github.com/Marcelinemdm/YaIndex" target="_blank" rel="noopener">YaIndex</a> — auto-atualizado via GitHub Actions</span>
  <a class="admin-link" href="admin.html">⚙️ Admin</a>
</footer>

<script>
const GITHUB_REPO = 'Marcelinemdm/YaIndex';
const DATA_URL = './data.json';
let allData = null;
let activeFilter = 'all';
let searchQuery = '';

function setTheme(t) {
  document.body.setAttribute('data-theme', t);
  localStorage.setItem('yaindex_theme', t);
  document.querySelectorAll('.th-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.t === t);
  });
}
(function initTheme() {
  const saved = localStorage.getItem('yaindex_theme') || 'novo';
  setTheme(saved);
})();

function fmtDate(raw) {
  if (!raw) return '—';
  try {
    const d = new Date(raw);
    if (isNaN(d)) return raw;
    const p = n => String(n).padStart(2,'0');
    return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
  } catch { return raw; }
}

let commitLoaded = false;
async function fetchCommit() {
  if (commitLoaded) return;
  commitLoaded = true;
  try {
    const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/commits?per_page=1`);
    const data = await res.json();
    const c = data[0];
    const sha = c.sha.slice(0,7);
    const msg = c.commit.message.split('\n')[0];
    const dt = new Date(c.commit.author.date);
    const p = n => String(n).padStart(2,'0');
    const dtStr = `${dt.getFullYear()}/${p(dt.getMonth()+1)}/${p(dt.getDate())} ${p(dt.getHours())}:${p(dt.getMinutes())}`;
    document.getElementById('commit-short').textContent = sha;
    document.getElementById('commit-msg').innerHTML = `<strong>${sha}</strong> ${msg}`;
    document.getElementById('commit-meta').textContent = `${c.commit.author.name} • ${dtStr}`;
    document.getElementById('commit-link').href = c.html_url;
  } catch {
    document.getElementById('commit-msg').textContent = 'Não foi possível carregar.';
  }
}

function toggleCommitPopup() {
  const popup = document.getElementById('commit-popup');
  const badge = document.getElementById('badge-commit');
  const showing = popup.classList.contains('show');
  popup.classList.remove('show');
  if (!showing) {
    const rect = badge.getBoundingClientRect();
    popup.style.top = (rect.bottom + 8) + 'px';
    let left = rect.left + rect.width/2 - 120;
    left = Math.max(8, Math.min(left, window.innerWidth - 260));
    popup.style.left = left + 'px';
    popup.classList.add('show');
    fetchCommit();
  }
}

document.addEventListener('click', e => {
  if (!e.target.closest('.badge-wrap'))
    document.getElementById('commit-popup').classList.remove('show');
});
window.addEventListener('scroll', () => {
  document.getElementById('commit-popup').classList.remove('show');
}, { passive: true });

async function loadData() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    allData = await res.json();
    renderAll();
  } catch(e) {
    document.getElementById('categories-grid').innerHTML =
      '<p style="color:var(--red);padding:2rem;grid-column:1/-1">Erro ao carregar data.json: ' + e.message + '</p>';
  }
}

function renderAll() {
  const total = allData.categories.reduce((s,c) => s + c.items.length, 0);
  document.getElementById('total-items').textContent = total;
  document.getElementById('total-cats').textContent = allData.categories.length;
  document.getElementById('last-updated').textContent = fmtDate(allData.meta?.last_updated);
  document.title = allData.meta?.title || 'YaIndex';

  const bar = document.getElementById('filter-bar');
  bar.innerHTML = '';
  const todosBtn = document.createElement('button');
  todosBtn.className = 'filter-btn' + (activeFilter === 'all' ? ' active' : '');
  todosBtn.textContent = '✨ Todos';
  todosBtn.onclick = () => setFilter('all', todosBtn);
  bar.appendChild(todosBtn);

  allData.categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (activeFilter === cat.id ? ' active' : '');
    btn.textContent = cat.icon + ' ' + cat.label;
    btn.onclick = () => setFilter(cat.id, btn);
    bar.appendChild(btn);
  });

  renderCategories();
}

function setFilter(catId, btn) {
  activeFilter = catId;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCategories();
}

function renderCategories() {
  const grid = document.getElementById('categories-grid');
  grid.innerHTML = '';
  const q = searchQuery.toLowerCase().trim();
  let totalVisible = 0;

  const cats = activeFilter === 'all'
    ? allData.categories
    : allData.categories.filter(c => c.id === activeFilter);

  cats.forEach(cat => {
    const matchItems = cat.items.filter(item => {
      if (!q) return true;
      return item.name.toLowerCase().includes(q) ||
        (item.tags||[]).some(t => t.toLowerCase().includes(q)) ||
        cat.label.toLowerCase().includes(q);
    });
    if (!matchItems.length && q) return;

    const card = document.createElement('div');
    card.className = 'category';

    const accent = document.createElement('div');
    accent.className = 'cat-accent';
    accent.style.background = cat.color || 'var(--a1)';

    const hdr = document.createElement('div');
    hdr.className = 'category-header';
    hdr.innerHTML = `
      <span class="cat-icon">${cat.icon}</span>
      <span class="cat-title">${cat.label}</span>
      <span class="cat-count">${matchItems.length}</span>
      <span class="cat-toggle">▾</span>`;
    hdr.prepend(accent);
    hdr.onclick = () => card.classList.toggle('collapsed');

    const list = document.createElement('div');
    list.className = 'items-list';
    const LIMIT = 8;

    matchItems.forEach((item, idx) => {
      const row = document.createElement('a');
      row.className = 'item' + (idx >= LIMIT ? ' hidden extra' : '');
      row.href = item.url;
      row.target = '_blank';
      row.rel = 'noopener noreferrer';
      let rankCls = 'item-rank';
      if (idx === 0) rankCls += ' r1';
      else if (idx === 1) rankCls += ' r2';
      else if (idx === 2) rankCls += ' r3';
      const st = item.status || 'online';
      const tagsHtml = (item.tags||[]).slice(0,3).map(t=>`<span class="tag">${t}</span>`).join('');
      row.innerHTML = `
        <span class="${rankCls}">${idx+1}</span>
        <span class="item-status status-${st}"></span>
        <span class="item-name">${item.name}</span>
        <span class="item-tags">${tagsHtml}</span>`;
      list.appendChild(row);
    });

    if (matchItems.length > LIMIT) {
      const btn = document.createElement('button');
      btn.className = 'show-more-btn';
      btn.textContent = `＋ Ver mais ${matchItems.length - LIMIT} sites`;
      btn.onclick = e => {
        e.stopPropagation();
        list.querySelectorAll('.extra').forEach(el => el.classList.remove('hidden','extra'));
        btn.remove();
      };
      list.appendChild(btn);
    }

    card.appendChild(hdr);
    card.appendChild(list);
    grid.appendChild(card);
    totalVisible += matchItems.length;
  });

  document.getElementById('no-results').style.display =
    (totalVisible === 0 && q) ? 'block' : 'none';
  document.getElementById('search-count').textContent =
    q ? `✨ ${totalVisible} resultado(s) para "${searchQuery}"` : '';
}

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderCategories();
});

loadData();
setInterval(() => loadData(), 6 * 60 * 60 * 1000);
</script>
</body>
</html>
